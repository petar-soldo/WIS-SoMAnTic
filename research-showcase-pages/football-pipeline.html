<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The foooooootball pipeline</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/main.css">
</head>
<body>
<header class="kul-header">
    <div class="kul-top-bar">
        <div class="kul-logo-container">
            <a href="../index.html" class="kul-logo">KU LEUVEN</a>
        </div>
        <div class="kul-top-right">
            <div class="kul-search-box">
                <input type="text" id="searchInput" placeholder="Zoeken in SoMAnTic">
                <span id="searchBtn" style="font-size: 1.2rem; cursor: pointer;">⚲</span>
            </div>
        </div>
    </div>
    <nav class="kul-main-nav">
        <ul class="kul-nav-list">
            <li><a href="../index.html">Home</a></li>
            <li><a href="../guidelines/guidelines.html">Guidelines</a></li>
            <li><a href="bluesky-keywords.html">BlueSky</a></li>
            <li><a href="demographics.html">Demographics</a></li>
            <li><a href="linguistic-analysis.html">Linguistics</a></li>
            <li><a href="football-pipeline.html">Football</a></li>
        </ul>
    </nav>
</header>

<div class="container mt-5 mb-5">
    <h1>The Football Pipeline</h1>
    <p>Select a league</p>
    <select name="league" id="league">
        <option value="4328">Premier League</option>
        <option value="4337">Eredivisie</option>
        <option value="4338">Pro League</option>
        <option value="4335">La Liga</option>
        <option value="4332">Serie A</option>
        <option value="4331">Bundesliga</option>
        <option value="4629">Croatian First Football League</option>
        <option value="4336">Σούπερ Λιγκ 1</option>
        <option value="4359">Chinese Super League</option>
    </select>
    <button onclick="fetchFootballData()">Get Football Data</button>
    <div id="result"></div>
</div>

<script>
    async function fetchFootballData() {
        const league = document.getElementById('league').value;
        const apiUrlTable = `https://www.thesportsdb.com/api/v1/json/123/lookuptable.php?l=${league}`;
        const apiUrlLeague = `https://www.thesportsdb.com/api/v1/json/123/lookupleague.php?id=${league}`;

        const responseLeague = await fetch(apiUrlLeague);
        const dataLeague = await responseLeague.json();
        const leagueName = dataLeague.leagues[0].strLeague;
        const badge = dataLeague.leagues[0].strBadge;

        const responseTable = await fetch(apiUrlTable);
        const dataTable = await responseTable.json();
        const teamNames = dataTable.table.map(team => team.strTeam);

        document.getElementById('result').innerHTML = `
            <h3>${leagueName}</h3>
            <img src="${badge}" alt="${leagueName} badge" style="max-width: 100px; margin-bottom: 15px;">
            <p>Here are top five teams in the league currently:</p>
            <ol>${teamNames.slice(0, 5).map(teamName => `<li>${teamName}</li>`).join('')}</ol>
        `;
    }

    // Global Search Logic
    function performSearch() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        if (!query) return;
        const searchRoutes = {
            'demographic': 'demographics.html', 'age': 'demographics.html',
            'linguistic': 'linguistic-analysis.html', 'language': 'linguistic-analysis.html',
            'bluesky': 'bluesky-keywords.html', 'football': 'football-pipeline.html',
            'guideline': '../guidelines/guidelines.html', 'dsa': '../guidelines/guidelines.html', 'about': 'about.html'
        };
        for (const keyword in searchRoutes) {
            if (query.includes(keyword)) { window.location.href = searchRoutes[keyword]; return; }
        }
        alert('No exact modules found for: "' + query + '"');
    }
    document.getElementById('searchInput').addEventListener('keypress', e => { if (e.key === 'Enter') performSearch(); });
    document.getElementById('searchBtn').addEventListener('click', performSearch);
</script>
</body>
</html>
