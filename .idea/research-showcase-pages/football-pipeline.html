<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The foootball pipeline</title>
</head>
<body>
<p>Select a league</p>
<select name="league" id="league">
    <option value="4328">English Premier League</option>
    <option value="4337">Dutch Eredivisie</option>
    <option value="4338">Belgian Pro League</option>
    <option value="4335">Spanish La Liga</option>
    <option value="4332">Italian Serie A</option>
    <option value="4331">German Bundesliga</option>
</select>
<button onclick="fetchFootballData()">Get Football Data</button>
<div id="result"></div>

<script>
    async function fetchFootballData() {
        const league = document.getElementById('league').value;
        const apiUrl = `https://www.thesportsdb.com/api/v1/json/123/lookuptable.php?l=${league}`;

        const response = await fetch(apiUrl);
        const data = await response.json();
        const teamNames = data.table.map(team => team.strTeam);

        document.getElementById('result').innerHTML = `<ol>${teamNames.map(teamName => `<li>${teamName}</li>`).join('')}</ol>`;
        };
</script>
</body>
</html>
